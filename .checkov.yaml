# Config de Checkov (escaneo de seguridad de la infra).
# soft-fail: reporta hallazgos pero NO bloquea el merge — las decisiones de costo
# del MVP (subredes públicas, ALB abierto a Internet) son intencionales. Revisa
# el reporte en el job summary y quita skips/soft-fail a medida que endurezcas.
directory:
  - templates
framework:
  - cloudformation
soft-fail: true
compact: true
quiet: true
skip-check:
  # ALB público por diseño: hoy expone HTTP de cara a Internet (HTTPS en el roadmap).
  - CKV_AWS_260 # SG con ingress 0.0.0.0/0 al puerto 80
  - CKV_AWS_24  # ingress 0.0.0.0/0 (ALB público)
  # Fargate en subred pública con IP pública para evitar el costo de NAT Gateway.
  - CKV_AWS_88  # recurso con IP pública asignada
  # ECR con tags mutables (se reusa :latest a propósito en este MVP).
  - CKV_AWS_51  # ECR image tag immutability
  # RDS Single-AZ, sin Enhanced Monitoring/Performance Insights, sin IAM auth
  # (password self-managed a propósito, ver templates/infra/rds.yml) y sin
  # exportar logs a CloudWatch: decisiones de costo/complejidad del MVP.
  - CKV_AWS_157 # RDS Multi-AZ
  - CKV_AWS_118 # RDS Enhanced Monitoring
  - CKV_AWS_161 # RDS IAM DB authentication
  - CKV_AWS_129 # RDS log exports a CloudWatch
