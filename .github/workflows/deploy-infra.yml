name: Deploy infra

# CI/CD de la infraestructura (CloudFormation).
#   - En cada PR: lint (cfn-lint) + seguridad (checkov) + validate-template, y un
#     "plan" que crea change sets para previsualizar el diff (sin cambiar nada).
#   - En push a main: despliega network -> security -> ecr -> ecs-cluster -> alb
#     -> backend-service, tras la aprobación manual del Environment `production`.
# El stack de bootstrap (OIDC + InfraDeployRole + DeployRole, templates/bootstrap/
# github-oidc.yml) NO lo gestiona el CI: define los propios roles que aquí se
# asumen, así que se despliega a mano.
# Autenticación con AWS vía GitHub OIDC (sin llaves estáticas): el rol a asumir
# (InfraDeployRole) lo crea el stack `bootstrap`.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read
  pull-requests: write # comentar el plan en el PR

concurrency:
  group: deploy-infra
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install --quiet cfn-lint checkov

      - name: cfn-lint
        run: cfn-lint

      - name: checkov (seguridad)
        run: checkov --config-file .checkov.yaml

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: validate-template
        run: bash scripts/cfn.sh validate

  plan:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Change set preview
        run: |
          {
            echo "## Plan de infraestructura (change sets)"
            echo ""
            for slug in network security ecr ecs-cluster alb backend-service; do
              bash scripts/cfn.sh changeset "$slug"
            done
          } | tee plan.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file plan.md --edit-last --create-if-none

  deploy:
    needs: plan
    runs-on: ubuntu-latest
    environment: production # gate de aprobación manual
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # El bootstrap (OIDC + InfraDeployRole + DeployRole) ya está desplegado a
      # mano. El CI no lo toca. Orden: network y security antes que alb (alb
      # importa el SG y las subredes); ecs-cluster y alb antes que
      # backend-service (importa el cluster y el target group).
      - name: Deploy network
        run: bash scripts/cfn.sh deploy network
      - name: Deploy security
        run: bash scripts/cfn.sh deploy security
      - name: Deploy ecr
        run: bash scripts/cfn.sh deploy ecr
      - name: Deploy ecs-cluster
        run: bash scripts/cfn.sh deploy ecs-cluster
      - name: Deploy alb
        run: bash scripts/cfn.sh deploy alb
      - name: Deploy backend-service
        run: bash scripts/cfn.sh deploy backend-service
