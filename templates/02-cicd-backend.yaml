AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant-backend - backend CI/CD: ECR for the image and an IAM role
  assumed by GitHub Actions via OIDC to push and deploy to ECS. The OIDC provider
  is created by the 00-cicd-infra bootstrap.

Parameters:
  ProjectName:
    Type: String
    Default: dev-assistant
  EcrRepositoryName:
    Type: String
    Default: dev-assistant-backend
  GitHubOrg:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /dev-assistant/cfn/GitHubOrg
    Description: >
      GitHub organization or user that owns the backend repo. Resolved from SSM
      Parameter Store (/dev-assistant/cfn/GitHubOrg).
  GitHubRepo:
    Type: String
    Default: dev-assistant-backend
    Description: Name of the backend repository on GitHub.

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrRepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              # The OIDC provider lives in the 00-cicd-infra bootstrap stack.
              Federated:
                Fn::ImportValue: !Sub "${ProjectName}-OidcProviderArn"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: ecr-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !GetAtt EcrRepository.Arn
        - PolicyName: ecs-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                Resource: "*"
              - Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${ProjectName}/${ProjectName}-backend"
              - Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

Outputs:
  DeployRoleArn:
    Description: Role ARN for the backend repo's AWS_ROLE_ARN secret.
    Value: !GetAtt DeployRole.Arn
  EcrRepositoryName:
    Value: !Ref EcrRepository
  EcrRepositoryUri:
    Description: Base URI of the ECR repo (without tag).
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryName}"
