AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant-backend — CI/CD (capa 3/4). Repositorio ECR para la imagen,
  proveedor OIDC de GitHub y rol IAM que GitHub Actions asume (sin llaves
  estáticas) para publicar en ECR y desplegar en ECS. Se despliega antes del
  primer build para que ECR exista.

Parameters:
  ProjectName:
    Type: String
    Default: dev-assistant
  EcrRepositoryName:
    Type: String
    Default: dev-assistant-backend
  GitHubOrg:
    Type: String
    Description: Organización o usuario de GitHub dueño del repo del backend.
  GitHubRepo:
    Type: String
    Default: dev-assistant-backend
    Description: Nombre del repositorio del backend en GitHub.
  CreateOIDCProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      "true" si la cuenta aún NO tiene el proveedor OIDC de GitHub. Solo puede
      existir uno por cuenta; pon "false" y rellena ExistingOIDCProviderArn si ya
      existe.
  ExistingOIDCProviderArn:
    Type: String
    Default: ""
    Description: ARN del proveedor OIDC existente (si CreateOIDCProvider=false).

Conditions:
  ShouldCreateOIDC: !Equals [!Ref CreateOIDCProvider, "true"]

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrRepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Conservar solo las ultimas 10 imagenes",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDC
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcb

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDC
                - !Ref GitHubOIDCProvider
                - !Ref ExistingOIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: ecr-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !GetAtt EcrRepository.Arn
        - PolicyName: ecs-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                Resource: "*"
              - Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${ProjectName}/${ProjectName}-backend"
              - Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

Outputs:
  DeployRoleArn:
    Description: ARN del rol para el secreto AWS_ROLE_ARN de GitHub.
    Value: !GetAtt DeployRole.Arn
  EcrRepositoryName:
    Value: !Ref EcrRepository
  EcrRepositoryUri:
    Description: URI base del repo ECR (sin tag).
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryName}"
  OIDCProviderArn:
    Value: !If [ShouldCreateOIDC, !Ref GitHubOIDCProvider, !Ref ExistingOIDCProviderArn]
