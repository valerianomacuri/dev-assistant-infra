AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant-backend - Service (layer 4/4). ACM certificate, ALB with HTTPS
  (WebSockets for socket.io), ECS cluster, task definition and Fargate service.
  The task runs in public subnets with a public IP (no NAT) and only receives
  traffic from the ALB. Injects the 4 secrets from SSM Parameter Store.

Parameters:
  ProjectName:
    Type: String
    Default: dev-assistant
  DomainName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /dev-assistant/cfn/DomainName
    Description: >
      Domain the API will serve (e.g. api.mydomain.com). Resolved from SSM
      (/dev-assistant/cfn/DomainName).
  # CertificateArn:
  #   Type: String
  #   Default: ""
  #   Description: >
  #     ARN of an already-validated ACM certificate. Leave empty for the stack to
  #     create one (requires HostedZoneId for automatic DNS validation, or manual
  #     validation if your DNS is not in Route53).
  ImageUri:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /dev-assistant/cfn/ImageUri
    Description: >
      Full ECR image URI with tag (repo:tag). Resolved from SSM
      (/dev-assistant/cfn/ImageUri).
  ContainerName:
    Type: String
    Default: app
    Description: Must match the workflow's CONTAINER_NAME variable.
  ContainerPort:
    Type: Number
    Default: 3000
  TaskCpu:
    Type: String
    Default: "512"
    Description: CPU units (512 = 0.5 vCPU).
  TaskMemory:
    Type: String
    Default: "1024"
    Description: Memory in MB.
  DesiredCount:
    Type: Number
    Default: 1
  CorsOrigins:
    Type: String
    Default: "*"
    Description: Allowed CORS origins (the deployed frontend URL).
  AnthropicModel:
    Type: String
    Default: claude-sonnet-4-6
  OpenAiEmbeddingModel:
    Type: String
    Default: text-embedding-3-small

Resources:
  # --- Application Load Balancer ---
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-AlbSecurityGroupId"
      Subnets:
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet1"
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet2"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-tg"
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-VpcId"
      TargetType: ip
      Protocol: HTTP
      Port: !Ref ContainerPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        # Stickiness for socket.io's long-polling fallback.
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      # DefaultActions:
      #   - Type: redirect
      #     RedirectConfig:
      #       Protocol: HTTPS
      #       Port: "443"
      #       StatusCode: HTTP_301
            

  # HttpsListener:
  #   Type: AWS::ElasticLoadBalancingV2::Listener
  #   Properties:
  #     LoadBalancerArn: !Ref LoadBalancer
  #     Port: 443
  #     Protocol: HTTPS
  #     SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
  #     Certificates:
  #       - CertificateArn: !Ref CertificateArn
  #     DefaultActions:
  #       - Type: forward
  #         TargetGroupArn: !Ref TargetGroup

  # --- ECS ---
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Ref ProjectName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-backend"
      RetentionInDays: 14

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-ecs-execution"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dev-assistant/*"
              - Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  # Task role: minimal. Only ECS Exec (to debug / run one-off SQL).
  # No S3/SQS/Lambda permissions in this phase.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-ecs-task"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ecs-exec
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssmmessages:CreateControlChannel
                  - ssmmessages:CreateDataChannel
                  - ssmmessages:OpenControlChannel
                  - ssmmessages:OpenDataChannel
                Resource: "*"

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-backend"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref ContainerName
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              AppProtocol: http
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: !Sub "${ContainerPort}"
            - Name: CORS_ORIGINS
              Value: !Ref CorsOrigins
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: S3_REGION
              Value: !Ref AWS::Region
            - Name: ANTHROPIC_MODEL
              Value: !Ref AnthropicModel
            - Name: OPENAI_EMBEDDING_MODEL
              Value: !Ref OpenAiEmbeddingModel
          # Secrets:
            # DATABASE_URL is an SSM SecureString. RDS is created in the console
            # with its own network (manual subnet group + SG), outside the stacks;
            # the endpoint/password go into this parameter.
            # - Name: DATABASE_URL
            #   ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dev-assistant/DATABASE_URL"
            # - Name: ANTHROPIC_API_KEY
            #   ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dev-assistant/ANTHROPIC_API_KEY"
            # - Name: OPENAI_API_KEY
            #   ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dev-assistant/OPENAI_API_KEY"
            # - Name: JWT_SECRET
            #   ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/dev-assistant/JWT_SECRET"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app

  Service:
    Type: AWS::ECS::Service
    # The service cannot register in the TG until the listener exists.
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub "${ProjectName}-backend"
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet1"
            - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet2"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${ProjectName}-AppSecurityGroupId"
      LoadBalancers:
        - ContainerName: !Ref ContainerName
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ClusterName:
    Description: Workflow ECS_CLUSTER variable.
    Value: !Ref Cluster
  ServiceName:
    Description: Workflow ECS_SERVICE variable.
    Value: !GetAtt Service.Name
  TaskFamily:
    Description: Workflow ECS_TASK_FAMILY variable.
    Value: !Sub "${ProjectName}-backend"
  ContainerName:
    Description: Workflow CONTAINER_NAME variable.
    Value: !Ref ContainerName
  AlbDnsName:
    Description: ALB DNS (point the domain record here).
    Value: !GetAtt LoadBalancer.DNSName
  LoadBalancerUrl:
    Value: !Sub "https://${DomainName}"
