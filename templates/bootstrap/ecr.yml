AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant-backend - ECR repository for the backend Docker image, with
  vulnerability scan-on-push and a lifecycle policy that keeps only the last
  10 images. Tags are mutable: the backend CI/CD reuses `:latest` on purpose
  for this MVP. This is a bootstrap stack: it is deployed MANUALLY, before the
  infra CI ever runs, so a placeholder image can be pushed to it first (see
  scripts/push-placeholder.sh) and backend-service can start with
  DesiredCount > 0 from its very first deploy.

Parameters:
  EcrRepositoryName:
    Type: String
    Default: dev-assistant-backend

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref EcrRepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only the last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

Outputs:
  EcrRepositoryName:
    Value: !Ref EcrRepository
  EcrRepositoryUri:
    Description: Base URI of the ECR repo (without tag).
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryName}"


