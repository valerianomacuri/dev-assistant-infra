AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant - INFRA + BACKEND CI/CD (bootstrap). GitHub OIDC provider (one
  per account), the InfraDeployRole that the infra repo's GitHub Actions assumes
  (no static keys) to validate and deploy the CloudFormation stacks, and the
  DeployRole that the backend repo's GitHub Actions assumes to push images to
  ECR and deploy to ECS. This is a bootstrap stack: it is deployed MANUALLY once
  because it defines the very role the infra CI uses to deploy everything else;
  the CI does not manage itself, so updates to either role also go by hand.


Parameters:
  ProjectName:
    Type: String
    Default: dev-assistant
  GitHubOrg:
    Type: String
    Default: valerianomacuri
    Description: >
      GitHub organization or user that owns the repos. 
  GitHubRepo:
    Type: String
    Default: dev-assistant-backend
    Description: Name of the backend repository on GitHub.
  InfraGitHubRepo:
    Type: String
    Default: dev-assistant-infra
    Description: >
      Infrastructure (CloudFormation) repository on GitHub. Its GitHub Actions
      assumes InfraDeployRole to validate and deploy the stacks.


Resources:
  # One per account. This bootstrap stack is deployed only once, so it always
  # creates the provider (the account must not already have a GitHub one).
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com

  # Role assumed by the INFRA repo's GitHub Actions to deploy the CloudFormation
  # stacks (network/security/ecr/ecs-cluster/alb/backend-service). It is
  # necessarily powerful: it manages networking, ALB, ECS, ACM, logs, ECR and
  # named IAM roles. It is scoped by Resource to the project prefix where the
  # service allows it; services whose ARN does not support a useful pattern
  # (ec2, elb, acm) stay on "*".
  InfraDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-infra-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${InfraGitHubRepo}:*"
      Policies:
        - PolicyName: cloudformation-stacks
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Management of the project stacks + change sets (PR preview).
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ListStacks
                  - cloudformation:ListStackResources
                  - cloudformation:ValidateTemplate
                Resource: "*"
        - PolicyName: infra-resources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Resources of the stacks managed by the CI. ec2/elb/acm do not
              # support a useful ARN pattern for these create/describe actions, so
              # they stay on "*".
              - Effect: Allow
                Action:
                  - ec2:*
                  - elasticloadbalancing:*
                  - ecs:*
                  - acm:*
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ChangeResourceRecordSets
                  - route53:GetChange
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DescribeLogGroups
                  - logs:TagResource
                  - logs:ListTagsForResource
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:PutLifecyclePolicy
                  - ecr:GetLifecyclePolicy
                  - ecr:SetRepositoryPolicy
                  - ecr:TagResource
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource: "*"
        - PolicyName: iam-named-roles
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # The stacks create named roles (CAPABILITY_NAMED_IAM). Scoped to the
              # project prefix. The OIDC provider is NOT here: it is created by this
              # bootstrap stack (manual), not by the CI.
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*"
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${ProjectName}-*"
        - PolicyName: observability-resources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  # CloudWatch Dashboard
                  - cloudwatch:PutDashboard
                  - cloudwatch:DeleteDashboards
                  - cloudwatch:GetDashboard

                  # CloudWatch Logs Metric Filters
                  - logs:PutMetricFilter
                  - logs:DeleteMetricFilter
                  - logs:DescribeMetricFilters

                  # SNS alarms topic
                  - sns:CreateTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:DeleteTopic
                  - sns:Subscribe
                  - sns:Unsubscribe
                Resource: "*"

  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-github-deploy"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOIDCProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: ecr-push
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !Sub "arn:${AWS::Partition}:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectName}-backend"
        - PolicyName: ecs-deploy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeServices
                Resource: "*"
              - Effect: Allow
                Action: ecs:UpdateService
                Resource: !Sub "arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:service/${ProjectName}/${ProjectName}-backend"
              - Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

Outputs:
  OidcProviderArn:
    Description: >
      GitHub OIDC provider ARN.
    Value: !Ref GitHubOIDCProvider
  InfraDeployRoleArn:
    Description: Role ARN for the infra repo's AWS_DEPLOY_ROLE_ARN secret.
    Value: !GetAtt InfraDeployRole.Arn
  DeployRoleArn:
    Description: Role ARN for the backend repo's AWS_ROLE_ARN secret.
    Value: !GetAtt DeployRole.Arn


