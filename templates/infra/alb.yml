AWSTemplateFormatVersion: "2010-09-09"
Description: >
  dev-assistant-backend - ALB over HTTP (WebSockets for socket.io) and its
  Target Group. HTTPS + custom domain (ACM certificate + HTTPS listener) are
  scaffolded as commented blocks for a future roadmap step.

Parameters:
  ProjectName:
    Type: String
    Default: dev-assistant
  # CertificateArn:
  #   Type: String
  #   Default: ""
  #   Description: >
  #     ARN of an already-validated ACM certificate. Leave empty for the stack to
  #     create one (requires HostedZoneId for automatic DNS validation, or manual
  #     validation if your DNS is not in Route53).
  ContainerPort:
    Type: Number
    Default: 3000


Resources:
  # --- Application Load Balancer ---
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ProjectName}-alb"
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - Fn::ImportValue: !Sub "${ProjectName}-AlbSecurityGroupId"
      Subnets:
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet1"
        - Fn::ImportValue: !Sub "${ProjectName}-PublicSubnet2"

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ProjectName}-tg"
      VpcId:
        Fn::ImportValue: !Sub "${ProjectName}-VpcId"
      TargetType: ip
      Protocol: HTTP
      Port: !Ref ContainerPort
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        # Stickiness for socket.io's long-polling fallback.
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"

  # HTTP today: forwards directly to the app. ROADMAP (HTTPS + custom domain):
  # swap the forward action for the commented redirect to 443, enable HttpsListener
  # below, and create + validate an ACM certificate.
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      # ROADMAP: replace the forward above with a redirect to HTTPS.
      # DefaultActions:
      #   - Type: redirect
      #     RedirectConfig:
      #       Protocol: HTTPS
      #       Port: "443"
      #       StatusCode: HTTP_301

  # ROADMAP (HTTPS): enable once an ACM certificate exists for DomainName.
  # HttpsListener:
  #   Type: AWS::ElasticLoadBalancingV2::Listener
  #   Properties:
  #     LoadBalancerArn: !Ref LoadBalancer
  #     Port: 443
  #     Protocol: HTTPS
  #     SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
  #     Certificates:
  #       - CertificateArn: !Ref CertificateArn
  #     DefaultActions:
  #       - Type: forward
  #         TargetGroupArn: !Ref TargetGroup

Outputs:
  AlbDnsName:
    Description: ALB DNS. Reach the API here over HTTP; point the domain record here later.
    Value: !GetAtt LoadBalancer.DNSName
  LoadBalancerUrl:
    Description: Public URL of the API. Becomes https://api.leovaleriano.click once HTTPS is enabled (roadmap).
    Value: !Sub "http://${LoadBalancer.DNSName}"
  TargetGroupArn:
    Description: ARN of the ALB Target Group.
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "${ProjectName}-TargetGroupArn"